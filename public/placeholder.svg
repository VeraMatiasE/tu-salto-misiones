<svg width="100%" height="100%" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="10" y="10" width="380" height="280" rx="16" ry="16" fill="#f0f0f0" stroke="#ccc" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Cámara (icono estilizado) -->
  <g transform="translate(130,90)" fill="#999">
    <rect x="20" y="20" width="100" height="60" rx="8" />
    <circle cx="70" cy="50" r="18" fill="#bbb"/>
    <rect x="45" y="10" width="20" height="10" rx="2"/>
  </g>

  <!-- Texto -->
  <text x="200" y="200" text-anchor="middle" font-size="20" fill="#888" font-family="sans-serif">
    Imagen no disponible
  </text>
</svg>
