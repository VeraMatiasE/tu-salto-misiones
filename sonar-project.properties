sonar.projectKey=VeraMatiasE_tu-salto-misiones
sonar.organization=tu-salto-misiones
sonar.javascript.lcov.reportPaths=./coverage/lcov.info
sonar.sources=src
sonar.exclusions=**/*.md,**/*.json,**/*.css
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx,**/*.css,**/page.tsx,**/layout.tsx
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:DuplicatedBlocks
sonar.issue.ignore.multicriteria.e1.resourceKey=src/app/api/**/*.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:DuplicatedBlocks
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.test.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:DuplicatedBlocks
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.spec.ts